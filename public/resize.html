<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #fafaf8; margin: 0; padding: 0; overflow: hidden; }
  canvas { display: none; }
  canvas.active { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>
  <img id="raw" src="img/raw_icon.png" style="display:none" onload="draw()">
  <script>
    function show(id) {
      document.querySelectorAll('canvas').forEach(c => c.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function draw() {
      const img = document.getElementById('raw');
      const ctx192 = document.getElementById('c192').getContext('2d');
      ctx192.drawImage(img, 0, 0, 192, 192);
      const ctx512 = document.getElementById('c512').getContext('2d');
      ctx512.drawImage(img, 0, 0, 512, 512);
      console.log('BASE64_192:' + document.getElementById('c192').toDataURL());
      console.log('BASE64_512:' + document.getElementById('c512').toDataURL());
      document.body.classList.add('ready');
    }
  </script>
</body>
</html>
